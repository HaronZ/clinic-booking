# Continuous integration — runs on every push to main and every PR.
#
# Two parallel jobs:
#   • backend  — PHPUnit against a real MySQL 8 service, after migrations
#   • frontend — Angular production build (catches template + TS errors)
#
# The CI badge in README.md is wired to this workflow's name (`CI`):
#   https://github.com/HaronZ/clinic-booking/actions/workflows/ci.yml/badge.svg

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel older in-flight runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinic_booking_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, openssl
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL is up."
              exit 0
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done
          echo "MySQL never came up."
          exit 1

      - name: Apply migrations to test database
        # Use the mysql CLI directly — more reliable than the PHP SQL parser
        # for CI. migrate.php is still used for Railway/local dev.
        env:
          MYSQL_PWD: root
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot clinic_booking_test \
            < backend/db/schema.sql
          for f in $(ls backend/db/migrations/*.sql | sort); do
            mysql -h 127.0.0.1 -P 3306 -uroot clinic_booking_test < "$f" \
              2>/dev/null || true
          done
          echo "Tables in clinic_booking_test:"
          mysql -h 127.0.0.1 -P 3306 -uroot \
            -e "SHOW TABLES IN clinic_booking_test;"
          mysql -h 127.0.0.1 -P 3306 -uroot \
            -e "SHOW TABLES IN clinic_booking_test;" \
            | grep -q staff_users \
            || { echo "ERROR: staff_users table missing after migration!"; exit 1; }

      - name: Run PHPUnit
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_NAME: clinic_booking_test
          TEST_DB_NAME: clinic_booking_test
          DB_USER: root
          DB_PASS: root
          JWT_SECRET: ci-only-secret-${{ github.sha }}-padding-padding-padding
        run: ./vendor/bin/phpunit --testdox

  frontend:
    name: Frontend (Angular build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npx ng build --configuration production
